<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniOMS - Dark Mode Exception Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #2b2d31; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-0"></div>

    <div class="bg-[#1e1f22] w-full max-w-lg rounded-2xl shadow-2xl relative z-10 flex flex-col overflow-hidden border border-[#313338]">
        
        <div class="bg-[#351a20] border-b border-[#52252e] px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-[#52252e] text-[#f87171] p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">
                    <i class="fas fa-exclamation-triangle text-lg"></i>
                </div>
                <h3 class="text-lg font-bold text-[#f87171]">Sự cố Tồn kho (Overselling)</h3>
            </div>
            <i class="fas fa-times text-gray-400 cursor-pointer hover:text-gray-200 text-lg transition"></i>
        </div>
        
        <div class="p-6 space-y-6">
            <div class="bg-[#2b2d31] p-4 rounded-xl border border-[#313338]">
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="text-gray-400">Mã đơn: <strong class="text-white ml-1">LZD-9988</strong></div>
                    <div class="text-gray-400">Nguồn: <strong class="text-[#60a5fa] ml-1">Lazada</strong></div>
                    <div class="col-span-2 text-gray-400">Sản phẩm: <strong class="text-white ml-1">QUANJEAN-B (Size L)</strong></div>
                </div>
            </div>

            <div class="flex items-center justify-between px-4">
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold mb-1">Khách đặt</div>
                    <div class="text-3xl font-black text-white">3</div>
                </div>
                <div class="text-[#313338] text-2xl"><i class="fas fa-arrow-right"></i></div>
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold mb-1">Tồn thực tế</div>
                    <div class="text-3xl font-black text-[#fbbf24]">2</div>
                </div>
                <div class="text-[#313338] text-2xl"><i class="fas fa-arrow-right"></i></div>
                <div class="text-center">
                    <div class="text-xs text-[#ef4444] uppercase font-bold mb-1">Buffer Stock</div>
                    <div class="text-3xl font-black text-[#ef4444]">2</div>
                </div>
            </div>
            
            <div class="text-sm text-[#fca5a5] bg-[#351a20] p-4 rounded-xl border border-[#52252e] flex items-start">
                <i class="fas fa-info-circle mt-0.5 mr-2 text-[#f87171]"></i> 
                <p><strong>Giải thích:</strong> Kho thực tế chỉ còn 2 cái, bằng đúng mức an toàn (Buffer = 2). Không đủ giao 3 cái. Hệ thống đã tự động báo hết hàng lên sàn.</p>
            </div>
        </div>

        <div class="bg-[#18191c] px-6 py-4 border-t border-[#313338] flex justify-end space-x-3">
            <button class="px-5 py-2.5 bg-[#2b2d31] border border-[#313338] rounded-lg text-sm font-semibold text-gray-300 hover:bg-[#313338] hover:text-white transition flex items-center">
                <i class="fas fa-phone-alt mr-2 text-gray-400"></i> Gọi KH Đổi món
            </button>
            <button class="px-5 py-2.5 bg-[#e11d48] text-white rounded-lg text-sm font-bold shadow-lg hover:bg-[#be123c] transition flex items-center">
                <i class="fas fa-times-circle mr-2"></i> Hủy đơn & Ghi Log
            </button>
        </div>

    </div>

</body>
</html>
